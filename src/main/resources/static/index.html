<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD de Produtos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="container">
    <h1>CRUD de Produtos</h1>

    <section class="card">
        <h2>Cadastrar Produto</h2>

        <div class="form-group">
            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Digite o nome do produto">
        </div>

        <div class="form-group">
            <label for="preco">Preço</label>
            <input type="number" id="preco" step="0.01" placeholder="Digite o preço">
        </div>

        <button id="btn-criar" type="button">Cadastrar</button>
    </section>

    <section class="card">
        <h2>Lista de Produtos</h2>
        <p id="mensagem"></p>
        <div id="lista-produtos"></div>
    </section>

    <section class="card hidden" id="secao-edicao">
        <h2>Editar Produto</h2>

        <input type="hidden" id="edit-id">

        <div class="form-group">
            <label for="edit-nome">Nome</label>
            <input type="text" id="edit-nome" placeholder="Novo nome">
        </div>

        <div class="form-group">
            <label for="edit-preco">Preço</label>
            <input type="number" id="edit-preco" step="0.01" placeholder="Novo preço">
        </div>

        <div class="acoes-edicao">
            <button id="btn-atualizar" type="button">Salvar Alterações</button>
            <button id="btn-cancelar-edicao" type="button">Cancelar</button>
        </div>
    </section>
</main>

<script src="app.js"></script>
</body>
</html>
